name: Create and check package
description: building, checking the package

runs:
  using: "composite"
  steps:
    - name: Create package 📦
      run: uv build --verbose
      shell: bash
      env:
        # Supply-chain guard: skip PyPI releases newer than this. See https://docs.astral.sh/uv/reference/settings/#exclude-newer
        UV_EXCLUDE_NEWER: "2 days"

    - name: Check package 📦
      working-directory: dist
      run: |
        ls -lh .
        twine check * --strict
      shell: bash
