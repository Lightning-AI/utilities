name: Test CLI

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main, "release/*"]

defaults:
  run:
    shell: bash

env:
  # Supply-chain guard: skip PyPI releases newer than this. See https://docs.astral.sh/uv/reference/settings/#exclude-newer
  UV_EXCLUDE_NEWER: "2 days"

jobs:
  test-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10"]
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up uv and Python 🐍 ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          activate-environment: true
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: install package
        run: |
          uv pip install -e '.[cli]'
          uv pip list

      - name: run CLI
        working-directory: ./requirements
        run: |
          python -m lightning_utilities.cli version
          python -m lightning_utilities.cli --help
          python -m lightning_utilities.cli requirements set-oldest --req_files="cli.txt"
          python -m lightning_utilities.cli requirements set-oldest --req_files='["cli.txt", "docs.txt"]'

      - name: Minimize uv cache
        run: uv cache prune --ci

  cli-guardian:
    runs-on: ubuntu-latest
    needs: test-cli
    if: always()
    steps:
      - run: echo "${{ needs.test-cli.result }}"
      - name: failing...
        if: needs.test-cli.result == 'failure'
        run: exit 1
      - name: cancelled or skipped...
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.test-cli.result)
        timeout-minutes: 1
        run: sleep 90
